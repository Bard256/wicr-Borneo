<!DOCTYPE html>
<html>
<head>
  <link href="main.css" rel="stylesheet"/>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ボルネオ島</title>
</head>
  <nav>
    <a class="active", onclick="show('welcome',this)">ようこそ</a>
    <a class, onclick="show('overview',this)">概要</a>
    <a class, onclick="show('news',this)">ニュース</a>
    <a class, onclick="show('immigration',this)">移民希望について</a>
  </nav>
  <div id="welcome" class="section">
    <line></line>
      <div class="t-title">ボルネオ島へようこそ</div>
    <p>マインクラフトサーバー『わいくら』内ボルネオ島ホームページへようこそ！</p>
    <line></line>
    
    </head>
  <body>
  <header>
    <h1>ボルネオ島へようこそ！</h1>
  </header>
</div>
  <script> 
    
function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(el) el.classList.add('active');
}

  </script>
 </body>
</html>
